services:
  tradingagents:
    build: .
    entrypoint: ["tradingagents"]
    command: []
    env_file:
      - .env
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    tty: true
    stdin_open: true

  headless:
    build: .
    env_file:
      - .env
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - ./results:/home/appuser/app/results
    command: ["--ticker", "NVDA", "--json", "--output-dir", "./results"]

  headless-worker:
    build: .
    env_file:
      - .env
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - ./results:/home/appuser/app/results
    command: ["--redis", "redis://redis:6379", "--consume", "--workers", "1"]
    depends_on:
      - redis
    profiles:
      - cluster

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    profiles:
      - cluster

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

volumes:
  tradingagents_data:
  redis_data:
  ollama_data:
