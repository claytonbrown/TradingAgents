services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  tradingagents:
    build: .
    env_file:
      - .env
    environment:
      - CACHE_URL=redis://redis:6379
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      redis:
        condition: service_healthy
    tty: true
    stdin_open: true

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
      - CACHE_URL=redis://redis:6379
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  tradingagents_data:
  ollama_data:
  redis_data:
